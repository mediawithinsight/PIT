<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Intelligence Tracker (PIT)</title>
<style>
  :root{
    color-scheme:light;
    --bg:#ffffff;--panel:#fff;--border:#e2e8f0;--border2:#cbd5e1;
    --text:#0f172a;--text2:#475569;--text3:#94a3b8;
    --teal-bg:#f0fdfa;--teal:#0d9488;--teal-text:#0f766e;
    --ora-bg:#fff7ed;--ora:#ea580c;--ora-text:#c2410c;
    --vio-bg:#f5f3ff;--vio:#7c3aed;--vio-text:#5b21b6;
    --sky-bg:#f0f9ff;--sky:#0369a1;--sky-text:#075985;
    --rose-bg:#fff1f2;--rose:#f43f5e;--rose-text:#be123c;
    --slt-bg:#f8fafc;--slt:#475569;--slt-text:#334155;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#ffffff;color:var(--text);min-height:100vh;}
  .content{background:#ffffff;}
  .hdr{background:#000;color:#fff;padding:22px 28px 0;position:relative;overflow:hidden;}
  .hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;position:relative;z-index:1;}
  .hdr-title-block{display:flex;flex-direction:column;gap:2px;}
  .hdr-eyebrow{font-size:10px;font-weight:700;letter-spacing:.25em;color:#94a3b8;text-transform:uppercase;margin-bottom:2px;}
  .hdr-main{font-size:36px;line-height:1.05;font-weight:300;letter-spacing:-.02em;color:#fff;}
  .hdr-bold{font-weight:800;color:#fff;display:block;}
  .hdr-sub{font-size:11.5px;color:#64748b;margin-top:6px;letter-spacing:.02em;}
  .tabs{position:relative;z-index:1;display:flex;gap:2px;align-items:flex-end;overflow-x:auto;-webkit-overflow-scrolling:touch;}
  .tab{padding:8px 20px;font-size:12.5px;font-weight:600;color:#94a3b8;cursor:pointer;border-radius:6px 6px 0 0;background:transparent;border:1px solid transparent;border-bottom:none;letter-spacing:.02em;transition:all .15s;white-space:nowrap;position:relative;}
  .tab.has-new::after{content:'';position:absolute;top:4px;right:6px;width:7px;height:7px;border-radius:50%;background:#f59e0b;border:1.5px solid #fff;}
  .tab:not(.active){border-color:#334155;background:rgba(255,255,255,.04);}
  .tab:hover{color:#e2e8f0;background:rgba(255,255,255,.06);}
  .tab.active{background:#f1f5f9;color:#000;}
  .tab-badge{display:inline-block;font-size:9px;padding:1px 5px;border-radius:10px;margin-left:5px;vertical-align:middle;font-weight:700;}
  .tab-badge.rdu{background:#0d9488;color:#fff;}
  .tab-badge.crcl{background:#7c3aed;color:#fff;}
  .tab-badge.nlr{background:#0369a1;color:#fff;}
  .tab-badge.rak{background:#b91c1c;color:#fff;}
  .tab-badge.andc{background:#b45309;color:#fff;}
  .tab-badge.cgnt{background:#065f46;color:#fff;}
  .tab-badge.kfr{background:#1e40af;color:#fff;}
  .tab-badge.big{background:#6b21a8;color:#fff;}
  .tab-badge.ogw{background:#9f1239;color:#fff;}
  .action-bar{display:flex;align-items:center;justify-content:space-between;padding:12px 28px;background:#fff;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:8px;}
  .run-btn{display:inline-flex;align-items:center;gap:7px;background:#000;color:#fff;border:none;border-radius:6px;padding:7px 16px;font-size:12.5px;font-weight:600;cursor:pointer;letter-spacing:.01em;transition:background .15s;}
  .run-btn:hover{background:#222;}
  .last-updated{font-size:11.5px;color:var(--text3);}
  #statusMsg{font-size:12px;padding:8px 12px;border-radius:6px;background:var(--teal-bg);color:var(--teal-text);display:none;}
  .content{padding:20px 28px;max-width:1080px;}
  .pane{display:none;}.pane.active{display:block;}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:16px;}
  .card-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:14px;}
  .legend{display:flex;gap:14px;font-size:11.5px;color:var(--text2);margin-bottom:18px;flex-wrap:wrap;align-items:center;}
  .legend span{display:inline-flex;align-items:center;gap:5px;}
  .lg-num{display:inline-flex;align-items:center;justify-content:center;width:15px;height:15px;border-radius:50%;font-size:8.5px;font-weight:700;}
  .g-project{margin-bottom:2px;}
  .g-proj-hdr{font-size:12px;color:var(--text2);padding:6px 0 6px 0;margin-left:0;border-top:1px solid var(--border);}
  .g-proj-name{display:inline-block;font-size:14px;font-weight:700;color:var(--text);padding:3px 10px;border:1.5px solid var(--border2);border-radius:6px;margin-right:8px;background:var(--panel);}
  .g-proj-hdr strong{color:var(--text);font-size:13px;font-weight:700;margin-right:8px;}
  .g-proj-mri{display:inline;font-size:11px;}
  .g-row{display:flex;gap:0;}
  .g-label{width:144px;flex-shrink:0;}
  .g-label .proj{font-size:13px;font-weight:700;color:var(--text);}
  .g-label .pticker{font-size:9.5px;color:var(--text3);}
  .g-label .row-tag{font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;display:inline-block;margin-top:3px;letter-spacing:.02em;}
  .g-label .row-tag.cat{background:var(--ora-bg);color:var(--ora-text);}
  .g-label .row-tag.res{background:var(--sky-bg);color:var(--sky-text);}
  .g-chart{flex:1;min-width:0;}
  .g-scroll-outer{overflow-x:auto;-webkit-overflow-scrolling:touch;flex:1;min-width:0;}
  .g-scroll-inner{min-width:var(--gantt-min-width,400px);}
  .g-axis{position:relative;height:18px;border-bottom:1px solid var(--border);}
  .g-axis span{position:absolute;bottom:2px;font-size:9.5px;color:var(--text3);transform:translateX(-50%);white-space:nowrap;}
  .g-axis .today-lbl{color:var(--text);font-weight:700;}
  .g-today-row{position:relative;height:16px;}
  .g-today-row span{position:absolute;font-size:10px;font-weight:700;color:#16a34a;transform:translateX(-50%);white-space:nowrap;}
  .g-track{position:relative;height:60px;overflow:visible;}
  .g-track.cat-track{border-top:1px solid #f1f5f9;}
  .g-track.res-track{border-top:1px dashed var(--border);}
  .g-today-line{position:absolute;top:0;bottom:0;width:2px;background:none;border-left:2px dashed #16a34a;z-index:2;}
  .g-future-bg{position:absolute;top:0;bottom:0;background:#f5f5f5;}
  .g-gridline{position:absolute;top:0;bottom:0;width:1px;background:var(--border);z-index:0;}
  .g-bar{position:absolute;top:26px;height:10px;border-radius:5px;background:var(--ora-bg);border:1px solid #fdba74;}
  .g-bar.quiet{opacity:.35;}
  .g-bar-future{position:absolute;top:26px;height:10px;border-radius:5px;background:repeating-linear-gradient(90deg,var(--ora-bg) 0,var(--ora-bg) 4px,#fff 4px,#fff 8px);border:1px dashed var(--ora);}
  .g-num{position:absolute;top:5px;width:17px;height:17px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8.5px;font-weight:700;transform:translateX(-50%);border:1.5px solid;z-index:4;cursor:default;}
  .g-num.past{background:var(--teal-bg);color:var(--teal-text);border-color:var(--teal);}
  .g-num.future{background:var(--ora-bg);color:var(--ora-text);border-color:var(--ora);border-style:dashed;}
  .g-num.milestone{background:var(--vio-bg);color:var(--vio-text);border-color:var(--vio);}
  .g-num.milestone.conf{background:var(--vio);color:#fff;border-color:var(--vio);}
  .g-num.media{background:var(--slt-bg);color:var(--slt-text);border-color:var(--slt);}
  .g-num.result{background:var(--sky-bg);color:var(--sky-text);border-color:var(--sky);}
  .g-num.overdue{background:var(--rose-bg);color:var(--rose-text);border-color:var(--rose);border-style:dashed;border-width:2px;}
  .g-dlabel{position:absolute;top:38px;font-size:8.5px;color:var(--text2);white-space:nowrap;transform:translateX(-50%);z-index:3;}
  .g-meta{font-size:12px;color:var(--text2);padding:8px 0 18px;margin-left:0;}
  .g-meta .sl{margin-bottom:6px;}
  .g-meta .sec{font-weight:700;color:var(--text);font-size:12px;margin:8px 0 3px;}
  .g-meta ul{margin:0;padding:0;list-style:none;}
  .g-meta ul li{display:flex;gap:7px;align-items:baseline;line-height:1.9;}
  .i-num{display:inline-flex;align-items:center;justify-content:center;min-width:16px;height:16px;border-radius:50%;font-size:8px;font-weight:700;flex-shrink:0;margin-top:2px;position:relative;}
  .i-num.past{background:var(--teal-bg);color:var(--teal-text);border:1px solid var(--teal);}
  .i-num.future{background:var(--ora-bg);color:var(--ora-text);border:1px dashed var(--ora);}
  .i-num.milestone{background:var(--vio-bg);color:var(--vio-text);border:1px solid var(--vio);}
  .i-num.milestone.conf{background:var(--vio);color:#fff;border:1px solid var(--vio);}
  .i-num.media{background:var(--slt-bg);color:var(--slt-text);border:1px solid var(--slt);}
  .i-num.result{background:var(--sky-bg);color:var(--sky-text);border:1px solid var(--sky);}
  .i-num.overdue{background:var(--rose-bg);color:var(--rose-text);border:2px dashed var(--rose);}
  .i-text{flex:1;}
  .i-date{font-weight:600;color:var(--text);margin-right:3px;}
  .tbd{color:var(--ora);font-style:italic;font-weight:600;}
  .overdue-txt{color:var(--rose);font-weight:700;}
  hr.div{border:none;border-top:1px solid var(--border);margin:0 0 20px;}
  table{width:100%;border-collapse:collapse;font-size:12px;}
  th{text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:var(--text3);padding:5px 8px;border-bottom:1px solid var(--border);white-space:nowrap;}
  td{padding:7px 8px;border-bottom:1px solid #f8fafc;vertical-align:top;}
  tr:hover td{background:#f8fafc;}
  .badge{display:inline-block;font-size:10px;font-weight:600;padding:2px 6px;border-radius:4px;white-space:nowrap;}
  .badge.speculative{background:var(--ora-bg);color:var(--ora-text);}
  .badge.confirmed{background:var(--teal-bg);color:var(--teal-text);}
  .badge.mixed{background:var(--slt-bg);color:var(--slt-text);}
  a.lnk{color:var(--sky);text-decoration:none;font-size:11px;}
  a.lnk:hover{text-decoration:underline;}
  .port{display:grid;grid-template-columns:repeat(auto-fit,minmax(175px,1fr));gap:12px;}
  .pcard{border:1px solid var(--border);border-radius:8px;padding:12px;background:#fafcff;}
  .pcard .pname{font-size:13px;font-weight:700;margin-bottom:3px;color:var(--text);}
  .pcard .ploc{font-size:11px;color:var(--text2);margin-bottom:7px;line-height:1.5;}
  .pcard .pstage{font-size:11px;color:var(--text2);line-height:1.5;}
  .ptag{display:inline-block;font-size:9.5px;font-weight:700;padding:2px 6px;border-radius:4px;margin-bottom:5px;}
  .ptag.confirmed{background:var(--teal-bg);color:var(--teal-text);}
  .ptag.speculative{background:var(--ora-bg);color:var(--ora-text);}
  .stage-pill{display:inline-block;font-size:9.5px;font-weight:700;padding:2px 8px;border-radius:10px;letter-spacing:.02em;cursor:help;white-space:nowrap;}
  .stage-pill.dim{font-weight:600;}
  /* PROJECT PROFILE sub-card: Stage / Location / M/I/I / Summary */
  .prof{display:grid;grid-template-columns:72px 1fr;gap:5px 12px;border:1px solid var(--border);border-radius:8px;background:#fafcff;padding:11px 13px;margin:0 0 12px;font-size:11.5px;line-height:1.55;color:var(--text2);}
  .prof-k{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);padding-top:2px;}
  .prof-v{min-width:0;}
  /* NEW badge/dot — computed via isFreshNew(), auto-expires 14d after loggedAt, no clearing needed */
  .new-badge{display:inline-block;font-size:9px;font-weight:800;color:#fff;background:#f59e0b;border-radius:8px;padding:1px 6px;margin-left:6px;letter-spacing:.03em;vertical-align:1px;}
  .g-num.is-new::after,.i-num.is-new::after{content:'';position:absolute;top:-2px;right:-2px;width:8px;height:8px;border-radius:50%;background:#f59e0b;border:1.5px solid #fff;}
  /* Orthogonal overlays — corner glyphs, bottom-left so they never collide with the NEW dot */
  .g-num.oblig::before,.i-num.oblig::before{content:'$';position:absolute;bottom:-4px;left:-5px;width:11px;height:11px;border-radius:50%;background:#0f766e;color:#fff;font-size:8px;font-weight:800;display:flex;align-items:center;justify-content:center;border:1.5px solid #fff;line-height:1;}
  .g-num.risk::before,.i-num.risk::before{content:'!';position:absolute;bottom:-4px;left:-5px;width:11px;height:11px;border-radius:50%;background:#be123c;color:#fff;font-size:8px;font-weight:800;display:flex;align-items:center;justify-content:center;border:1.5px solid #fff;line-height:1;}
  .g-num.warr::before,.i-num.warr::before{content:'W';position:absolute;bottom:-4px;left:-5px;width:11px;height:11px;border-radius:50%;background:#1e3a8a;color:#facc15;font-size:7.5px;font-weight:800;display:flex;align-items:center;justify-content:center;border:1.5px solid #fff;line-height:1;}
  .money{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;}
  .money-ic{display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px;border-radius:50%;font-size:9px;font-weight:800;color:#fff;line-height:1;}
  .money.itm .money-ic{background:#15803d;}
  .money.otm .money-ic{background:#be123c;}
  .money.itm{color:#15803d;}
  .money.otm{color:#be123c;}
  /* POSITION INTELLIGENCE */
  .alloc-bar{display:flex;height:24px;border-radius:7px;overflow:hidden;border:1px solid var(--border);}
  .alloc-seg{display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#fff;white-space:nowrap;overflow:hidden;}
  .pos-held{display:inline-block;font-size:9px;font-weight:700;padding:2px 8px;border-radius:9px;background:#0f172a;color:#fff;letter-spacing:.02em;}
  .pos-tbl{width:100%;border-collapse:collapse;font-size:11px;}
  .pos-tbl th{text-align:left;font-size:9.5px;text-transform:uppercase;letter-spacing:.04em;color:var(--text3);padding:5px 8px;border-bottom:1px solid var(--border);}
  .pos-tbl td{padding:5px 8px;border-bottom:1px solid #f1f5f9;color:var(--text2);white-space:nowrap;}
  .pos-tbl tr.consol td{font-weight:700;color:var(--text);background:#f8fafc;}
  /* MOBILE: table → stacked cards keyed off the same tbody */
  @media(max-width:640px){
    .pos-tbl,.pos-tbl thead,.pos-tbl tbody,.pos-tbl tr,.pos-tbl td{display:block;width:auto;}
    .pos-tbl thead{display:none;}
    .pos-tbl tr{border:1px solid var(--border);border-radius:8px;padding:8px 10px;margin-bottom:6px;background:#fff;}
    .pos-tbl tr.consol{background:#f8fafc;border-width:2px;}
    .pos-tbl td{border:none;padding:2px 0;white-space:normal;display:flex;justify-content:space-between;gap:12px;font-size:12px;}
    .pos-tbl td::before{content:attr(data-lbl);font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--text3);flex-shrink:0;}
    .pos-tbl td:first-child{border-bottom:1px solid #f1f5f9;margin-bottom:4px;padding-bottom:4px;font-size:14px;font-weight:800;}
    .pos-tbl td:first-child::before{display:none;}
  }
  @media(max-width:640px){.prof{grid-template-columns:60px 1fr;}}
  .footnote{font-size:11px;color:var(--text3);text-align:center;margin-top:6px;}
  /* SUMMARY TAB */
  .tab-badge.summary{background:#0f172a;color:#fff;}
  .tab-badge[class*=" "]{background:#e2e8f0!important;color:#475569!important;}
  .sum-section{font-size:12.1px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin:0 0 12px;}
  .sum-section.sum-main{font-size:13.75px;font-weight:800;letter-spacing:.05em;color:var(--text2);}
  /* Sub-sections inside Summary Intelligence: bordered panel, grey title band, white body */
  .sum-section:not(.sum-main){border:1px solid var(--border);border-radius:9px 9px 0 0;background:#f1f5f9;padding:12px 46px 11px 14px;margin:14px 0 0;}
  .sum-section:not(.sum-main)+.clps-body{border:1px solid var(--border);border-top:none;border-radius:0 0 9px 9px;background:#fff;padding:14px;margin-bottom:2px;}
  .sum-section:not(.sum-main).closed{border-radius:9px;margin-bottom:2px;}
  .sum-timeline{position:relative;height:80px;overflow-x:auto;-webkit-overflow-scrolling:touch;border-bottom:1px solid var(--border);margin-bottom:4px;}
  .sum-tl-inner{position:relative;height:100%;min-width:800px;}
  .sum-axis{position:relative;height:18px;border-bottom:1px solid var(--border);}
  .sum-axis span{position:absolute;bottom:2px;font-size:9.5px;color:var(--text3);transform:translateX(-50%);white-space:nowrap;}
  .sum-axis .sum-today-lbl{color:#16a34a;font-weight:700;}
  .sum-event{position:absolute;top:24px;display:flex;flex-direction:column;align-items:center;cursor:default;z-index:3;}
  .sum-dot{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:#fff;flex-shrink:0;border:2px solid rgba(255,255,255,.4);}
  .sum-ticker-lbl{font-size:7.5px;font-weight:700;margin-top:2px;white-space:nowrap;}
  .sum-today-line{position:absolute;top:0;bottom:0;width:2px;background:none;border-left:2px dashed #16a34a;z-index:2;}
  .sum-gridline{position:absolute;top:18px;bottom:0;width:1px;background:var(--border);z-index:0;}
  .sum-list{display:flex;flex-direction:column;gap:6px;margin-bottom:18px;}
  .sum-item{display:flex;align-items:baseline;gap:8px;font-size:12px;padding:5px 8px;border-radius:6px;background:#f8fafc;}
  .sum-item-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:2px;}
  .sum-item-date{font-weight:600;color:var(--text);min-width:70px;flex-shrink:0;}
  .sum-item-body{flex:1;color:var(--text2);}
  .sum-item-ticker{font-weight:700;margin-right:4px;}
  .rank-list{display:flex;flex-direction:column;gap:8px;}
  .rank-item{display:flex;gap:12px;align-items:flex-start;padding:10px 12px;border-radius:8px;border-left:4px solid;}
  .rank-num{font-size:18px;font-weight:800;color:var(--text3);min-width:28px;flex-shrink:0;line-height:1.2;}
  .rank-body{flex:1;}
  .rank-ticker{font-size:13px;font-weight:700;}
  .rank-name{font-size:11px;color:var(--text2);margin-left:6px;}
  .rank-rating{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;margin-left:8px;vertical-align:middle;}
  .rank-rating.hot{background:#fef2f2;color:#dc2626;}
  .rank-rating.warm{background:#fff7ed;color:#ea580c;}
  .rank-rating.watch{background:#f0f9ff;color:#0369a1;}
  .rank-rating.hold{background:#f8fafc;color:#64748b;}
  .rank-cat{font-size:11.5px;color:var(--text2);margin-top:3px;line-height:1.6;}
  .rank-risk{font-size:11px;color:var(--rose-text);margin-top:2px;}
  /* SUMMARY INTELLIGENCE */
  .intel-strip{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:14px;}
  .intel-chip{font-size:11px;font-weight:700;padding:4px 10px;border-radius:14px;border:1.5px solid #cbd5e1;background:#fff;color:#94a3b8;cursor:pointer;transition:all .12s;letter-spacing:.02em;}
  .intel-chip.on{border-color:var(--chipc,#475569);color:var(--chipc,#475569);background:#fff;box-shadow:inset 0 0 0 1px var(--chipc,#475569);}
  .intel-go{display:inline-flex;align-items:center;gap:6px;background:#000;color:#fff;border:none;border-radius:6px;padding:6px 14px;font-size:12px;font-weight:600;cursor:pointer;margin-left:auto;}
  .intel-go:hover{background:#222;}
  .intel-go:disabled{background:#94a3b8;cursor:wait;}
  .intel-status{font-size:11px;color:var(--text2);width:100%;margin-top:4px;}
  .intel-ts{font-size:10px;color:var(--text3);font-weight:400;margin-left:8px;text-transform:none;letter-spacing:0;}
  .conf-badge{display:inline-block;font-size:8.5px;font-weight:700;padding:1px 6px;border-radius:3px;letter-spacing:.05em;vertical-align:middle;margin-left:6px;}
  .conf-badge.sourced{background:var(--teal-bg);color:var(--teal-text);border:1px solid var(--teal);}
  .conf-badge.synth{background:var(--vio-bg);color:var(--vio-text);border:1px solid var(--vio);}
  .conf-badge.spec{background:var(--ora-bg);color:var(--ora-text);border:1px dashed var(--ora);}
  .macro-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .macro-cell{border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:11.5px;color:var(--text2);line-height:1.6;}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function fmtD(d,mode){
  if(!d) return '';
  if(d.length<=7||d.includes('\u2013')) return d;
  const opts=mode==='tick'?{month:'short'}:mode==='short'?{month:'short',day:'numeric'}:{month:'short',day:'numeric',year:'numeric'};
  try{return new Date(d).toLocaleDateString('en-US',opts);}catch(e){return d;}
}
// ─── COMPUTED VISUAL STATE (never stored) ────────────────────────────────────
// Approved mapping: isMilestone → milestone (dark if Confirmed, light otherwise);
// category Research → result; category Event + media source → media;
// else confirmed date → past, otherwise future. Overdue = estDate passed with no
// confirmed date — evaluated live at render, never persisted.
// ─── POSITION SUMMARY (computed from INTEL_DATA.positions) ──────────────────
function posSummary(){
  const P=(typeof INTEL_DATA!=='undefined'&&INTEL_DATA.positions)||null;
  if(!P||!P.lots||!P.lots.length)return null;
  const byT={};let total=0,totalMV=0;
  P.lots.forEach(l=>{
    const v=l.shares*l.avgCost;total+=v;
    if(!byT[l.ticker])byT[l.ticker]={shares:0,value:0,lots:[]};
    byT[l.ticker].shares+=l.shares;byT[l.ticker].value+=v;byT[l.ticker].lots.push(l);
  });
  let allPriced=true;
  Object.entries(byT).forEach(([k,t])=>{
    t.avgCost=t.value/t.shares;
    t.price=(P.prices||{})[k]||null;
    if(t.price){t.mv=t.shares*t.price.price;totalMV+=t.mv;}
    else{allPriced=false;t.mv=null;totalMV+=t.value;}
  });
  // Weights on market basis when every held name has a quote; cost basis otherwise
  Object.values(byT).forEach(t=>{t.pct=((t.mv!==null?t.mv:t.value)/totalMV)*100;});
  return {byTicker:byT,total,totalMV:allPriced?totalMV:null,allPriced,asOf:P.asOf,prices:P.prices||{}};
}

// ─── "NEW" BADGE — computed auto-expiry, same philosophy as overdue/freshness ────────────
// isNew is authored when a record is added; loggedAt (when I added it) is separate from the
// record's own date/estDate (what happened) — same date-vs-logged-date split as the freshness
// system. Badge shows only inside a 14-day window from loggedAt, then fades with no action
// needed — nothing to remember to clear.
const NEW_WINDOW_DAYS=14;
function isFreshNew(e){
  if(!e||!e.isNew)return false;
  if(!e.loggedAt)return true;
  return (new Date()-new Date(e.loggedAt))/86400000<=NEW_WINDOW_DAYS;
}

function visualState(e){
  if(e.isMilestone)return 'milestone';
  if(e.category==='Research')return 'result';
  if(e.category==='Event'&&/interview|podcast|video|webinar|media|conference/i.test(e.sourceType||''))return 'media';
  return e.date?'past':'future';
}
function recOverdue(e){
  return !e.date&&!!e.estDate&&new Date(e.estDate)<new Date();
}
// Orthogonal overlays — like isMilestone, these are WEIGHTS on a record, not new categories,
// so they survive lifecycle changes (a forecast obligation stays an obligation once paid).
//   obligation → $ badge: money the company must pay out (option payments, earn-in commitments)
//   risk       → ! badge: adverse development (legal setback, failed program, impairment)
//   warrant    → W badge: warrant expiry tranche (money IN if exercised — dilution too)
function livePrice(sym){
  const p=(typeof INTEL_DATA!=='undefined'&&INTEL_DATA.positions&&INTEL_DATA.positions.prices)||{};
  return p[sym]?p[sym].price:null;
}
// Moneyness is COMPUTED from the live quote — never stored, so it can't go stale.
function moneyness(e){
  if(!e.warrant)return null;
  const px=livePrice(e.symbol);
  if(px===null)return null;
  return px>=e.warrant.strike?'itm':'otm';
}
function numClass(base,e){
  const vs=visualState(e);
  let cls=base+' '+vs;
  if(vs==='milestone'&&e.confidence==='Confirmed')cls+=' conf';
  if(recOverdue(e))cls+=' overdue';
  if(e.obligation)cls+=' oblig';
  if(e.risk)cls+=' risk';
  if(e.warrant)cls+=' warr';
  return cls;
}

const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const QTR=[0,3,6,9];
function monthTicks(rStart,rEnd,pctFn){
  const ticks=[],cur=new Date(rStart.getFullYear(),rStart.getMonth(),1);
  cur.setMonth(cur.getMonth()+1);
  while(cur<=rEnd){
    const p=pctFn(cur);
    if(p>1&&p<99) ticks.push({label:MONTHS[cur.getMonth()],pct:p,isQtr:QTR.includes(cur.getMonth())});
    cur.setMonth(cur.getMonth()+1);
  }
  return ticks;
}

    const linkStr=r.link?`<a class="lnk" href="${r.link}" target="_blank" rel="noopener">link</a>`:'—';

// ─── SCROLL TO TODAY ─────────────────────────────────────────────────────────
function scrollToToday(){
  const doScroll=()=>{
    document.querySelectorAll('[data-today-pct]').forEach(el=>{
      const pct=parseFloat(el.dataset.todayPct);
      const minW=parseFloat(el.dataset.minW);
      if(!pct||!minW||el.clientWidth===0) return;
      const todayPx=(pct/100)*minW;
      el.scrollLeft=Math.max(0,todayPx-el.clientWidth*0.35);
    });
  };
  setTimeout(doScroll,150);
  setTimeout(doScroll,600);
}
// ─── MOBILE COLLAPSIBLE SECTIONS (Summary tab only) ─────────────────────────
// Wraps content after each .sum-section header into a toggle body. Toggle only
// responds on small screens; desktop always shows everything (CSS-gated).
function collapsify(root,keepOpenFirst,sel){
  const isMobile=()=>window.matchMedia&&window.matchMedia('(max-width:640px)').matches;
  const heads=[...root.querySelectorAll(sel||'.sum-section')].filter(h=>!h.classList.contains('clps'));
  heads.forEach((head,idx)=>{
    const parent=head.parentNode;if(!parent)return;
    const body=document.createElement('div');body.className='clps-body';
    let sib=head.nextSibling;
    const stopCls=head.classList.contains('card-title')?'card-title':'sum-section';
    while(sib&&!(sib.nodeType===1&&sib.classList&&sib.classList.contains(stopCls))){
      const next=sib.nextSibling;body.appendChild(sib);sib=next;
    }
    parent.insertBefore(body,head.nextSibling);
    head.classList.add('clps');
    if((isMobile()&&!(keepOpenFirst&&idx===0))||head.dataset.startClosed==='1'){
      head.classList.add('closed');body.classList.add('closed');
    }
    head.addEventListener('click',(ev)=>{
      // Never toggle collapse from a click/tap that landed on the ID chip — that's what
      // was blocking copy: the chip is a child of this clickable header.
      if(ev.target.closest('.sec-id'))return;
      head.classList.toggle('closed');body.classList.toggle('closed');
    });
  });
}

// ─── SECTION ID CHIPS ────────────────────────────────────────────────────────
// Every card/section gets a stable visible ID (e.g. SUM:action-board, RDU:catalyst-timeline)
// so issues can be referenced precisely in feedback.
function slugify(t){return String(t||'').toLowerCase().split('—')[0].replace(/&amp;/g,'and').replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'').split('-').slice(0,3).join('-')||'section';}
function tagSectionIds(){
  const seen=new Set();
  document.querySelectorAll('.pane').forEach(pane=>{
    const prefix=pane.id==='pane-SUMMARY'?'SUM':pane.id.replace('pane-','');
    pane.querySelectorAll('.sum-section, .card-title').forEach(head=>{
      if(head.querySelector('.sec-id'))return;
      // Header text only (exclude timestamps/badges already inside)
      const raw=(head.childNodes[0]&&head.childNodes[0].textContent)||head.textContent;
      let id=prefix+':'+slugify(raw);
      let n=2;while(seen.has(id)){id=prefix+':'+slugify(raw)+'-'+n;n++;}
      seen.add(id);
      const host=head.closest('.card')&&head.matches('.card-title')?head.closest('.card'):head;
      host.id=host.id||('sec-'+id.replace(':','-'));
      const chip=document.createElement('span');chip.className='sec-id';chip.textContent=id;
      head.appendChild(chip);
    });
  });
}

      item.innerHTML='<div class="rank-num">'+(i+1)+'</div><div class="rank-body">'
        +'<div><span class="rank-ticker" style="color:'+col+'">'+esc(r.ticker)+'</span>'
        +'<span class="tkt-tf" style="margin-left:8px;">'+(TF_LABEL[r.timeframe]||esc(r.timeframe||''))+'</span>'
        +'<span style="font-size:10px;margin-left:8px;color:#d97706;letter-spacing:2px;">'+'\u25CF'.repeat(conv)+'<span style="color:#e2e8f0;">'+'\u25CF'.repeat(5-conv)+'</span></span>'
        +confBadge(r.confidence)
        +(hp?' <span class="pos-held">HELD '+hp.pct.toFixed(1)+'% \u00b7 '+hp.shares.toLocaleString()+' @ $'+hp.avgCost.toFixed(3)+'</span>':'')+'</div>'
        +'<div class="rank-cat">'+esc(r.thesis||'')+'</div>'
        +(r.why?'<div class="rank-cat" style="color:var(--text3);">'+esc(r.why)+'</div>':'')
        +(th?'<div class="rank-cat" style="margin-top:4px;padding-top:4px;border-top:1px dashed var(--border);">'
          +'<span style="font-size:9px;font-weight:700;padding:1px 8px;border-radius:9px;background:'+th.color+'20;color:'+th.color+';margin-right:6px;vertical-align:1px;">THESIS: '+th.label.toUpperCase()+'</span>'
          +'<span style="color:var(--text2);">'+th.note+'</span></div>':'')
        +'</div>';
      list.appendChild(item);
    });
    rSec.appendChild(list);
  } else {
    rSec.innerHTML+='<div class="intel-empty">Ranked opportunities appear here after an intelligence run — ranked by conviction across 2-week, 1-month, 5-month and long-hold windows.</div>';
  }
  card.appendChild(rSec);

  const sSec=document.createElement('div');
  sSec.innerHTML='<div class="sum-section" style="margin-top:16px;">Scenario Matrix'+intelTs(syn&&syn.generatedAt)+'</div>';
  if(syn&&Array.isArray(syn.scenarios)&&syn.scenarios.length){
    syn.scenarios.forEach(sc=>{
      const row=document.createElement('div');row.className='scn-row';
      row.innerHTML='<span class="scn-if">IF</span><div class="scn-body"><strong>'+esc(sc.condition||sc.if||'')+'</strong> \u2192 '
        +(Array.isArray(sc.up)&&sc.up.length?'<span class="scn-up">\u25B2 '+sc.up.map(esc).join(', ')+'</span>':'')
        +(Array.isArray(sc.down)&&sc.down.length?' <span class="scn-dn">\u25BC '+sc.down.map(esc).join(', ')+'</span>':'')
        +(sc.note?'<div style="margin-top:2px;color:var(--text3);font-size:11px;">'+esc(sc.note)+'</div>':'')
        +'</div>';
      sSec.appendChild(row);
    });
  } else {
    sSec.innerHTML+='<div class="intel-empty">IF/THEN branches (copper breaks, election outcomes, assay hits/misses) appear here after a run.</div>';
  }
  card.appendChild(sSec);

  const kSec=document.createElement('div');
  kSec.innerHTML='<div class="sum-section" style="margin-top:16px;">Trade Tickets &amp; Action Triage'+intelTs(syn&&syn.generatedAt)+'</div>'
    +'<div style="font-size:10px;color:var(--text3);margin:-6px 0 10px;">Action Board merged here: each ticket carries its triage bucket, days to nearest catalyst, and data freshness (\u26A0 stale after 14 days without a confirmed source update — checked biweekly). Tickers without tickets appear in the triage strip below.</div>';
  const freshBadge=t=>{
    const fr=(window.PIT_FRESH||{})[t];
    if(!fr||fr.daysSince===null)return '<span class="conf-badge spec">UNVERIFIED</span>';
    return fr.stale?'<span class="conf-badge spec">\u26A0 STALE '+fr.daysSince+'d</span>'
      :'<span class="conf-badge sourced">\u2713 '+fr.daysSince+'d</span>';
  };
  const daysChip=t=>{
    const d=(window.PIT_DAYSTO||{})[t];
    return d!==null&&d!==undefined?'<span style="font-size:10.5px;font-weight:700;color:var(--text2);">'+d+'d to catalyst</span>':'<span style="font-size:10px;color:#94a3b8;">catalyst TBD</span>';
  };
  const bucketOf=t=>(window.PIT_BUCKETS||[]).find(b=>b.tickers.includes(t))||null;
  const bucketChip=t=>{
    const b=bucketOf(t);
    return b?'<span style="font-size:9px;font-weight:700;padding:2px 8px;border-radius:9px;background:'+b.bg+';color:'+b.border+';border:1px solid '+b.border+';">'+b.label+'</span>':'';
  };
  const ticketed=new Set();
  const PSt=posSummary();
  if(syn&&Array.isArray(syn.tickets)&&syn.tickets.length){
    syn.tickets.forEach(tk=>{
      ticketed.add(tk.ticker);
      const col=(TICKER_DATA[tk.ticker]&&TICKER_DATA[tk.ticker].color)||'#475569';
      const hp=PSt&&PSt.byTicker[tk.ticker];
      const el=document.createElement('div');el.className='tkt';el.style.borderLeftColor=col;
      el.innerHTML='<div class="tkt-head"><span><span class="rank-ticker" style="color:'+col+';font-size:14px;">'+esc(tk.ticker)+'</span>'
        +'<span class="tkt-tf" style="margin-left:8px;">'+(TF_LABEL[tk.timeframe]||esc(tk.timeframe||''))+'</span>'+confBadge(tk.confidence)
        +(hp?' <span class="pos-held">HELD '+hp.pct.toFixed(1)+'% \u00b7 '+hp.shares.toLocaleString()+' @ $'+hp.avgCost.toFixed(3)+'</span>':'')+'</span>'
        +'<span style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">'+bucketChip(tk.ticker)+daysChip(tk.ticker)+freshBadge(tk.ticker)+'</span></div>'
        +(tk.window?'<div style="font-size:11px;color:var(--text2);margin-bottom:6px;">Window: <strong>'+esc(tk.window)+'</strong></div>':'')
        +'<dl class="tkt-grid">'
        +'<dt>Entry</dt><dd>'+esc(tk.entry||'—')+'</dd>'
        +'<dt>Stop</dt><dd>'+esc(tk.stop||'—')+'</dd>'
        +'<dt>Target</dt><dd>'+esc(tk.target||'—')+'</dd>'
        +'<dt>Sizing</dt><dd>'+esc(tk.sizing||'—')+'</dd>'
        +'</dl>';
      kSec.appendChild(el);
    });
  } else {
    kSec.innerHTML+='<div class="intel-empty">Trade tickets (entry / stop / target / sizing logic, tied to insider positioning and expectations repricing) appear here after an intel import.</div>';
  }
  // ── Triage strip: buckets for tickers without a live ticket ──
  (window.PIT_BUCKETS||[]).forEach(b=>{
    const rest=b.tickers.filter(t=>!ticketed.has(t));
    if(!rest.length)return;
    const grp=document.createElement('div');
    grp.style.cssText='border:1.5px solid '+b.border+';background:'+b.bg+';border-radius:10px;padding:10px 12px;margin-bottom:8px;';
    let h='<div style="display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:4px;margin-bottom:6px;">'
      +'<span style="font-size:12px;font-weight:700;">'+b.label+' — no ticket yet</span>'
      +'<span style="font-size:10px;color:#64748b;">'+b.sub+'</span></div>';
    rest.forEach(t=>{
      const th=(window.PIT_THESIS||{})[t]||{};
      const col=(TICKER_DATA[t]&&TICKER_DATA[t].color)||'#475569';
      h+='<div style="background:#fff;border-radius:7px;padding:7px 10px;margin-bottom:6px;border-left:3px solid '+col+';">'
        +'<div style="display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:2px;">'
        +'<span style="font-size:12.5px;font-weight:800;color:'+col+';">'+t+'</span>'
        +'<span style="display:flex;gap:8px;align-items:center;">'+daysChip(t)+freshBadge(t)+'</span></div>'
        +(th.action?'<div style="font-size:11px;color:#475569;line-height:1.5;">'+th.action+'</div>':'')
        +'</div>';
    });
    grp.innerHTML=h;
    kSec.appendChild(grp);
  });
  card.appendChild(kSec);

  const foot=document.createElement('p');foot.className='footnote';
  foot.textContent='SOURCED = found via live search · SYNTHESIZED = Claude\u2019s interpretation of sourced data · SPECULATIVE = forecast with material uncertainty. Verify insider filings on SEDI/EDGAR before acting. Not financial advice.';
  card.appendChild(foot);
  host.appendChild(card);
  collapsify(host,false);   // mobile: intel sections start collapsed
  tagSectionIds();
}


// ─── INIT ────────────────────────────────────────────────────────────────────
// Storage namespace 'ticker2:' — v2.2.0 schema. Old 'ticker:' entries (pre-unification
// schema with events.text/type/overdue) are deliberately ignored so stale-schema data
// can never render against the new code.
async function init(){
  // Seed storage from TICKER_DATA if not already stored
  for(const[k,v]of Object.entries(TICKER_DATA)){
    try{const ex=await window.storage.get('ticker2:'+k);if(!ex)await window.storage.set('ticker2:'+k,JSON.stringify(v));}catch(e){}
  }
  // Load from storage — overlays any per-ticker edits saved this session on top of the baked-in defaults
  const live={};
  for(const k of Object.keys(TICKER_DATA)){
    try{const s=await window.storage.get('ticker2:'+k);live[k]=s?JSON.parse(s.value):TICKER_DATA[k];}
    catch(e){live[k]=TICKER_DATA[k];}
  }
  buildPanes(live);scrollToToday();
  document.getElementById('hdrVer').textContent=PIT_VERSION;
  document.getElementById('lastUpdated').textContent='Last updated: '+new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}
init();
</script>
