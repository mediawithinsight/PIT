<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Intelligence Tracker (PIT)</title>
<style>
  :root{
    --bg:#f1f5f9;--panel:#fff;--border:#e2e8f0;--border2:#cbd5e1;
    --text:#0f172a;--text2:#475569;--text3:#94a3b8;
    --teal-bg:#f0fdfa;--teal:#0d9488;--teal-text:#0f766e;
    --ora-bg:#fff7ed;--ora:#ea580c;--ora-text:#c2410c;
    --vio-bg:#f5f3ff;--vio:#7c3aed;--vio-text:#5b21b6;
    --sky-bg:#f0f9ff;--sky:#0369a1;--sky-text:#075985;
    --rose-bg:#fff1f2;--rose:#f43f5e;--rose-text:#be123c;
    --slt-bg:#f8fafc;--slt:#475569;--slt-text:#334155;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
  .hdr{background:#000;color:#fff;padding:22px 28px 0;position:relative;overflow:hidden;}
  .hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;position:relative;z-index:1;}
  .hdr-title-block{display:flex;flex-direction:column;gap:2px;}
  .hdr-eyebrow{font-size:10px;font-weight:700;letter-spacing:.25em;color:#94a3b8;text-transform:uppercase;margin-bottom:2px;}
  .hdr-main{font-size:36px;line-height:1.05;font-weight:300;letter-spacing:-.02em;color:#fff;}
  .hdr-bold{font-weight:800;color:#fff;display:block;}
  .hdr-sub{font-size:11.5px;color:#64748b;margin-top:6px;letter-spacing:.02em;}
  .tabs{position:relative;z-index:1;display:flex;gap:2px;align-items:flex-end;overflow-x:auto;-webkit-overflow-scrolling:touch;}
  .tab{padding:8px 20px;font-size:12.5px;font-weight:600;color:#94a3b8;cursor:pointer;border-radius:6px 6px 0 0;background:transparent;border:none;letter-spacing:.02em;transition:all .15s;white-space:nowrap;}
  .tab:hover{color:#e2e8f0;background:rgba(255,255,255,.06);}
  .tab.active{background:#f1f5f9;color:#000;}
  .tab-badge{display:inline-block;font-size:9px;padding:1px 5px;border-radius:10px;margin-left:5px;vertical-align:middle;font-weight:700;}
  .tab-badge.rdu{background:#0d9488;color:#fff;}
  .tab-badge.crcl{background:#7c3aed;color:#fff;}
  .tab-badge.nlr{background:#0369a1;color:#fff;}
  .tab-badge.rak{background:#b91c1c;color:#fff;}
  .tab-badge.andc{background:#b45309;color:#fff;}
  .tab-badge.cgnt{background:#065f46;color:#fff;}
  .tab-badge.kfr{background:#1e40af;color:#fff;}
  .tab-badge.big{background:#6b21a8;color:#fff;}
  .tab-badge.ogw{background:#9f1239;color:#fff;}
  .action-bar{display:flex;align-items:center;justify-content:space-between;padding:12px 28px;background:#fff;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:8px;}
  .run-btn{display:inline-flex;align-items:center;gap:7px;background:#000;color:#fff;border:none;border-radius:6px;padding:7px 16px;font-size:12.5px;font-weight:600;cursor:pointer;letter-spacing:.01em;transition:background .15s;}
  .run-btn:hover{background:#222;}
  .last-updated{font-size:11.5px;color:var(--text3);}
  #statusMsg{font-size:12px;padding:8px 12px;border-radius:6px;background:var(--teal-bg);color:var(--teal-text);display:none;}
  .content{padding:20px 28px;max-width:1080px;}
  .pane{display:none;}.pane.active{display:block;}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:16px;}
  .card-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:14px;}
  .legend{display:flex;gap:14px;font-size:11.5px;color:var(--text2);margin-bottom:18px;flex-wrap:wrap;align-items:center;}
  .legend span{display:inline-flex;align-items:center;gap:5px;}
  .lg-num{display:inline-flex;align-items:center;justify-content:center;width:15px;height:15px;border-radius:50%;font-size:8.5px;font-weight:700;}
  .g-project{margin-bottom:2px;}
  .g-row{display:flex;gap:0;}
  .g-label{width:144px;flex-shrink:0;}
  .g-label .proj{font-size:13px;font-weight:700;color:var(--text);}
  .g-label .pticker{font-size:9.5px;color:var(--text3);}
  .g-label .row-tag{font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;display:inline-block;margin-top:3px;letter-spacing:.02em;}
  .g-label .row-tag.cat{background:var(--ora-bg);color:var(--ora-text);}
  .g-label .row-tag.res{background:var(--sky-bg);color:var(--sky-text);}
  .g-chart{flex:1;min-width:0;}
  .g-axis{position:relative;height:18px;border-bottom:1px solid var(--border);}
  .g-axis span{position:absolute;bottom:2px;font-size:9.5px;color:var(--text3);transform:translateX(-50%);white-space:nowrap;}
  .g-axis .today-lbl{color:var(--text);font-weight:700;}
  .g-track{position:relative;height:48px;overflow:visible;}
  .g-track.cat-track{border-top:1px solid #f1f5f9;}
  .g-track.res-track{border-top:1px dashed var(--border);}
  .g-today-line{position:absolute;top:0;bottom:0;width:1.5px;background:var(--border2);z-index:2;}
  .g-future-bg{position:absolute;top:0;bottom:0;background:#f8fafc;}
  .g-gridline{position:absolute;top:0;bottom:0;width:1px;background:var(--border);z-index:0;}
  .g-bar{position:absolute;top:26px;height:10px;border-radius:5px;background:var(--ora-bg);border:1px solid #fdba74;}
  .g-bar.quiet{opacity:.35;}
  .g-bar-future{position:absolute;top:26px;height:10px;border-radius:5px;background:repeating-linear-gradient(90deg,var(--ora-bg) 0,var(--ora-bg) 4px,#fff 4px,#fff 8px);border:1px dashed var(--ora);}
  .g-num{position:absolute;top:5px;width:17px;height:17px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8.5px;font-weight:700;transform:translateX(-50%);border:1.5px solid;z-index:4;cursor:default;}
  .g-num.past{background:var(--teal-bg);color:var(--teal-text);border-color:var(--teal);}
  .g-num.future{background:var(--ora-bg);color:var(--ora-text);border-color:var(--ora);border-style:dashed;}
  .g-num.milestone{background:var(--vio-bg);color:var(--vio-text);border-color:var(--vio);}
  .g-num.media{background:var(--slt-bg);color:var(--slt-text);border-color:var(--slt);}
  .g-num.result{background:var(--sky-bg);color:var(--sky-text);border-color:var(--sky);}
  .g-dlabel{position:absolute;top:38px;font-size:8.5px;color:var(--text2);white-space:nowrap;transform:translateX(-50%);z-index:3;}
  .g-meta{font-size:12px;color:var(--text2);padding:8px 0 18px;margin-left:144px;}
  .g-meta .sl{margin-bottom:6px;}
  .g-meta .sec{font-weight:700;color:var(--text);font-size:12px;margin:8px 0 3px;}
  .g-meta ul{margin:0;padding:0;list-style:none;}
  .g-meta ul li{display:flex;gap:7px;align-items:baseline;line-height:1.9;}
  .i-num{display:inline-flex;align-items:center;justify-content:center;min-width:16px;height:16px;border-radius:50%;font-size:8px;font-weight:700;flex-shrink:0;margin-top:2px;}
  .i-num.past{background:var(--teal-bg);color:var(--teal-text);border:1px solid var(--teal);}
  .i-num.future{background:var(--ora-bg);color:var(--ora-text);border:1px dashed var(--ora);}
  .i-num.milestone{background:var(--vio-bg);color:var(--vio-text);border:1px solid var(--vio);}
  .i-num.media{background:var(--slt-bg);color:var(--slt-text);border:1px solid var(--slt);}
  .i-num.result{background:var(--sky-bg);color:var(--sky-text);border:1px solid var(--sky);}
  .i-text{flex:1;}
  .i-date{font-weight:600;color:var(--text);margin-right:3px;}
  .tbd{color:var(--ora);font-style:italic;font-weight:600;}
  .overdue-txt{color:var(--rose);font-weight:700;}
  hr.div{border:none;border-top:1px solid var(--border);margin:0 0 20px;}
  table{width:100%;border-collapse:collapse;font-size:12px;}
  th{text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:var(--text3);padding:5px 8px;border-bottom:1px solid var(--border);white-space:nowrap;}
  td{padding:7px 8px;border-bottom:1px solid #f8fafc;vertical-align:top;}
  tr:hover td{background:#f8fafc;}
  .badge{display:inline-block;font-size:10px;font-weight:600;padding:2px 6px;border-radius:4px;white-space:nowrap;}
  .badge.speculative{background:var(--ora-bg);color:var(--ora-text);}
  .badge.confirmed{background:var(--teal-bg);color:var(--teal-text);}
  .badge.mixed{background:var(--slt-bg);color:var(--slt-text);}
  a.lnk{color:var(--sky);text-decoration:none;font-size:11px;}
  a.lnk:hover{text-decoration:underline;}
  .port{display:grid;grid-template-columns:repeat(auto-fit,minmax(175px,1fr));gap:12px;}
  .pcard{border:1px solid var(--border);border-radius:8px;padding:12px;background:#fafcff;}
  .pcard .pname{font-size:13px;font-weight:700;margin-bottom:3px;color:var(--text);}
  .pcard .ploc{font-size:11px;color:var(--text2);margin-bottom:7px;line-height:1.5;}
  .pcard .pstage{font-size:11px;color:var(--text2);line-height:1.5;}
  .ptag{display:inline-block;font-size:9.5px;font-weight:700;padding:2px 6px;border-radius:4px;margin-bottom:5px;}
  .ptag.confirmed{background:var(--teal-bg);color:var(--teal-text);}
  .ptag.speculative{background:var(--ora-bg);color:var(--ora-text);}
  .footnote{font-size:11px;color:var(--text3);text-align:center;margin-top:6px;}
  .ticker-hbar{display:flex;align-items:center;justify-content:space-between;padding:14px 0 10px;flex-wrap:wrap;gap:8px;}
  .ticker-hbar-left{display:flex;align-items:center;gap:10px;}
  .ticker-sym{font-size:22px;font-weight:800;color:var(--text);letter-spacing:-.01em;}
  .ticker-name{font-size:14px;color:var(--text2);font-weight:400;}
  .ticker-hbar-right{display:flex;align-items:center;}
  .pres-link{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;color:var(--sky);text-decoration:none;padding:5px 12px;border:1px solid var(--sky);border-radius:6px;transition:all .15s;}
  .pres-link:hover{background:var(--sky-bg);}
  @media(max-width:640px){
    .hdr{padding:16px 16px 0;}
    .hdr-main{font-size:26px;}
    .hdr-sub{font-size:10.5px;}
    .tab{padding:7px 14px;font-size:11.5px;}
    .action-bar{padding:10px 16px;}
    .content{padding:14px 12px;}
    .card{padding:14px;}
    .legend{gap:9px;font-size:10px;}
    .g-row{flex-direction:column;gap:2px;}
    .g-label{width:100%;flex-shrink:1;padding-top:0!important;margin-top:10px;}
    .g-label .proj{font-size:12.5px;}
    .g-chart{width:100%;}
    .g-meta{margin-left:0;padding:6px 0 16px;}
    .g-axis{height:16px;}
    .g-axis span{font-size:8.5px;}
    .g-axis .tick-mid{display:none;}
    .g-track{height:42px;}
    .g-num{width:15px;height:15px;font-size:7.5px;}
    .g-dlabel{font-size:7.5px;top:34px;}
    table{font-size:10.5px;}
    th{font-size:9px;padding:4px 5px;}
    td{padding:5px 5px;}
    .port{grid-template-columns:1fr;}
  }
</style>
</head>

</div>
<div class="content" id="content"></div>

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function fmtD(d,mode){
  if(!d) return '';
  if(d.length<=7||d.includes('\u2013')) return d;
  const opts=mode==='tick'?{month:'short'}:mode==='short'?{month:'short',day:'numeric'}:{month:'short',day:'numeric',year:'numeric'};
  try{return new Date(d).toLocaleDateString('en-US',opts);}catch(e){return d;}
}
const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const QTR=[0,3,6,9];
function monthTicks(rStart,rEnd,pctFn){
  const ticks=[],cur=new Date(rStart.getFullYear(),rStart.getMonth(),1);
  cur.setMonth(cur.getMonth()+1);
  while(cur<=rEnd){
    const p=pctFn(cur);
    if(p>1&&p<99) ticks.push({label:MONTHS[cur.getMonth()],pct:p,isQtr:QTR.includes(cur.getMonth())});
    cur.setMonth(cur.getMonth()+1);
  }
  return ticks;
}

// ─── GANTT ────────────────────────────────────────────────────────────────────
function renderGantt(ticker,td,container){
  const today=new Date(),body=document.createElement('div');
  Object.entries(td.projectDefs).forEach(([proj,pd])=>{
    const rStart=new Date(pd.rangeStart),rEnd=new Date(today);
    rEnd.setMonth(rEnd.getMonth()+pd.futureMonths);
    const span=rEnd-rStart,pct=d=>Math.max(0,Math.min(99.5,((new Date(d)-rStart)/span)*100));
    const todayP=pct(today),ticks=monthTicks(rStart,rEnd,pct);
    const futEvts=pd.events.filter(e=>!e.date);
    const fzS=todayP+3,fzE=95;
    futEvts.forEach((e,i)=>{
      if(e.estDate){e._p=pct(e.estDate);}
      else{const un=futEvts.filter(x=>!x.estDate);e._p=fzS+un.indexOf(e)*(fzE-fzS)/Math.max(un.length-1,1);}
    });
    const block=document.createElement('div');block.className='g-project';
    // Axis row
    const axR=document.createElement('div');axR.className='g-row';
    const axL=document.createElement('div');axL.className='g-label';axL.style.paddingTop='20px';
    axL.innerHTML=`<div class="proj">${proj}</div><div class="pticker">${ticker}</div>`;
    const axC=document.createElement('div');axC.className='g-chart';
    const axis=document.createElement('div');axis.className='g-axis';
    ticks.forEach(t=>{const s=document.createElement('span');s.textContent=t.label;s.style.left=t.pct+'%';s.className=t.isQtr?'tick-qtr':'tick-mid';axis.appendChild(s);});
    const tls=document.createElement('span');tls.textContent='Today';tls.className='today-lbl';tls.style.left=todayP+'%';axis.appendChild(tls);
    axC.appendChild(axis);axR.appendChild(axL);axR.appendChild(axC);block.appendChild(axR);
    function makeTrack(cls){
      const row=document.createElement('div');row.className='g-row';
      const lbl=document.createElement('div');lbl.className='g-label';lbl.style.display='flex';lbl.style.alignItems='center';
      const ch=document.createElement('div');ch.className='g-chart';
      const tr=document.createElement('div');tr.className='g-track '+cls;
      const fb=document.createElement('div');fb.className='g-future-bg';fb.style.cssText=`left:${todayP}%;width:${100-todayP}%;`;tr.appendChild(fb);
      const tl=document.createElement('div');tl.className='g-today-line';tl.style.left=todayP+'%';tr.appendChild(tl);
      ticks.forEach(t=>{const gl=document.createElement('div');gl.className='g-gridline';gl.style.left=t.pct+'%';tr.appendChild(gl);});
      ch.appendChild(tr);row.appendChild(lbl);row.appendChild(ch);
      return {row,lbl,track:tr};
    }
    const {row:catRow,lbl:catLbl,track:catTr}=makeTrack('cat-track');
    catLbl.innerHTML='<span class="row-tag cat">Events &amp; Catalysts</span>';
    if(pd.revisions&&pd.revisions.length){
      const rd=pd.revisions.map(r=>r.date),x0=pct(rd[0]),xL=pct(rd[rd.length-1]);
      const sb=document.createElement('div');sb.className='g-bar';sb.style.cssText=`left:${x0}%;width:${Math.max(xL-x0,.5)}%;`;catTr.appendChild(sb);
      const qb=document.createElement('div');qb.className='g-bar quiet';qb.style.cssText=`left:${xL}%;width:${Math.max(todayP-xL,0)}%;`;catTr.appendChild(qb);
      const mP=futEvts.length?futEvts[futEvts.length-1]._p:93;
      const fbar=document.createElement('div');fbar.className='g-bar-future';fbar.style.cssText=`left:${todayP}%;width:${Math.max(mP-todayP,0)}%;`;catTr.appendChild(fbar);
    }
    const usedP=[];
    pd.events.forEach(e=>{
      let xp=e.date?pct(e.date):(e._p!==undefined?e._p:null);if(xp===null)return;
      let nudge=0;while(usedP.some(u=>Math.abs(u-(xp+nudge))<3.5))nudge+=4;xp+=nudge;usedP.push(xp);
      const m=document.createElement('div');m.className=`g-num ${e.type==='media'?'media':e.type}`;
      if(e.overdue)m.style.outline='2px solid var(--rose)';
      m.style.left=xp+'%';m.textContent=e.type==='milestone'?'\u2605':e.n;
      if(e.link){m.style.cursor='pointer';m.onclick=()=>window.open(e.link,'_blank');}
      m.title=(e.date?fmtD(e.date)+' \u2014 ':(e.estDate?'Est. '+fmtD(e.estDate)+(e.overdue?' \u26a0 OVERDUE':'')+' \u2014 ':'TBD \u2014 '))+e.text;
      catTr.appendChild(m);
      const dl=document.createElement('div');dl.className='g-dlabel';dl.style.left=xp+'%';
      if(e.date)dl.textContent=fmtD(e.date,'short');
      else if(e.estDate){dl.textContent=(e.overdue?'\u26a0 ':'')+fmtD(e.estDate,'short')+'*';dl.style.color=e.overdue?'var(--rose)':'var(--ora)';}
      catTr.appendChild(dl);

    block.appendChild(catRow);
    const {row:resRow,lbl:resLbl,track:resTr}=makeTrack('res-track');
    resLbl.innerHTML='<span class="row-tag res">Exploration Results</span>';
    const usedRP=[];
    (pd.results||[]).filter(r=>r.date_key).forEach(r=>{
      let xp=pct(r.date_key);let nudge=0;while(usedRP.some(u=>Math.abs(u-(xp+nudge))<3.5))nudge+=4;xp+=nudge;usedRP.push(xp);
      const m=document.createElement('div');m.className='g-num result';m.style.left=xp+'%';m.textContent=r.n;m.title=r.date+' \u2014 '+r.text;resTr.appendChild(m);
      const dl=document.createElement('div');dl.className='g-dlabel';dl.style.left=xp+'%';dl.textContent=fmtD(r.date_key,'short');resTr.appendChild(dl);
    });
    block.appendChild(resRow);
    const meta=document.createElement('div');meta.className='g-meta';

    const cu=document.createElement('ul');

      const lo=e.link?`<a href="${e.link}" target="_blank" rel="noopener" style="color:var(--sky);text-decoration:none;">`:'';

      li.appendChild(ns);li.appendChild(ts);cu.appendChild(li);
    });
    meta.appendChild(cu);
    meta.innerHTML+='<div class="sec">Exploration Results to Date</div>';
    const ru=document.createElement('ul');
    (pd.results||[]).forEach(r=>{
      const li=document.createElement('li');
      const ns=document.createElement('span');ns.className='i-num result';ns.textContent=r.n;
      const ts=document.createElement('span');ts.className='i-text';ts.innerHTML=(r.date?`<span class="i-date">${r.date}</span> \u2014 `:'')+ r.text;
      li.appendChild(ns);li.appendChild(ts);ru.appendChild(li);
    });
    meta.appendChild(ru);
    block.appendChild(meta);
    const hr=document.createElement('hr');hr.className='div';block.appendChild(hr);
    body.appendChild(block);
  });
  container.appendChild(body);
}

// ─── TABLE ────────────────────────────────────────────────────────────────────
function renderTable(td,container){
  const wrap=document.createElement('div');wrap.style.overflowX='auto';
  const tbl=document.createElement('table');
  tbl.innerHTML='<thead><tr><th>Symbol</th><th>Project</th><th>Title</th><th>Type</th><th>Confidence</th><th>Date</th><th>Source</th><th>Link</th><th>Notes</th></tr></thead>';
  const tb=document.createElement('tbody');
  (td.catalysts||[]).forEach(r=>{
    const tr=document.createElement('tr');
    if(r.isNew)tr.style.background='#fffbeb';
    const cc=r.confidence==='Confirmed'?'confirmed':(r.confidence==='Speculative'?'speculative':'mixed');
    const newBadge=r.isNew?'<span class="new-badge">NEW</span>':'';
    tr.innerHTML=`<td>${r.symbol}</td><td>${r.project}</td><td>${r.title}${newBadge}</td><td>${r.type}</td><td><span class="badge ${cc}">${r.confidence}</span></td><td>${fmtD(r.date)}</td><td>${r.sourceType}</td><td><a class="lnk" href="${r.link}" target="_blank" rel="noopener">link</a></td><td>${r.notes||''}</td>`;
    tb.appendChild(tr);
  });
  tbl.appendChild(tb);wrap.appendChild(tbl);container.appendChild(wrap);
}

// ─── PORTFOLIO ────────────────────────────────────────────────────────────────
function renderPortfolio(td,container){
  const grid=document.createElement('div');grid.className='port';
  (td.portfolio||[]).forEach(p=>{
    const c=document.createElement('div');c.className='pcard';
    c.innerHTML=`<div class="ptag ${p.tag}">${p.tag==='confirmed'?'Has data':'Early-stage'}</div><div class="pname">${p.name}</div><div class="ploc">${p.loc}</div><div class="pstage">${p.stage}</div>`;
    grid.appendChild(c);
  });
  container.appendChild(grid);
}

// ─── BUILD PANES ─────────────────────────────────────────────────────────────
function buildPanes(data){
  const content=document.getElementById('content'),tabsEl=document.getElementById('tabs');
  tabsEl.innerHTML='';content.innerHTML='';
  Object.entries(data).forEach(([ticker,td],i)=>{
    const tab=document.createElement('button');tab.className='tab'+(i===0?' active':'');
    tab.dataset.ticker=ticker;
    tab.innerHTML=ticker;
    tab.onclick=()=>switchTab(ticker);tabsEl.appendChild(tab);
    const pane=document.createElement('div');pane.className='pane'+(i===0?' active':'');pane.id=`pane-${ticker}`;
    // ── Ticker header bar ──
    const hbar=document.createElement('div');hbar.className='ticker-hbar';
    const hLeft=document.createElement('div');hLeft.className='ticker-hbar-left';
    hLeft.innerHTML=`<span class="ticker-sym">${ticker}</span><span class="ticker-name">${td.name}</span><span class="tab-badge ${ticker.toLowerCase()}" style="font-size:10px;padding:2px 7px;">${td.exchange}</span>`;
    const hRight=document.createElement('div');hRight.className='ticker-hbar-right';
    if(td.presentationUrl){
      hRight.innerHTML=`<a href="${td.presentationUrl}" target="_blank" rel="noopener" class="pres-link"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg> Corporate Presentation</a>`;
    }
    hbar.appendChild(hLeft);hbar.appendChild(hRight);pane.appendChild(hbar);
    const g=document.createElement('div');g.className='card';
    g.innerHTML='<div class="card-title">Catalyst Timeline</div><div class="legend"><span><span class="lg-num" style="background:var(--teal-bg);color:var(--teal-text);border:1px solid var(--teal);">1</span>Past confirmed</span><span><span class="lg-num" style="background:var(--ora-bg);color:var(--ora-text);border:1px dashed var(--ora);">5</span>Future / pending</span><span><span class="lg-num" style="background:var(--vio-bg);color:var(--vio-text);border:1px solid var(--vio);">&#9733;</span>Milestone</span><span><span class="lg-num" style="background:var(--sky-bg);color:var(--sky-text);border:1px solid var(--sky);">1</span>Exploration result</span><span style="color:var(--text3);font-style:italic;">* = estimated &nbsp; &#9888; = overdue</span></div>';
    renderGantt(ticker,td,g);pane.appendChild(g);
    const s=document.createElement('div');s.className='card';
    s.innerHTML='<div class="card-title">Full Dataset — Schema View</div>';
    renderTable(td,s);pane.appendChild(s);
    const p=document.createElement('div');p.className='card';
    p.innerHTML='<div class="card-title">Project Portfolio — Location &amp; Stage</div>';
    renderPortfolio(td,p);pane.appendChild(p);
    pane.appendChild(Object.assign(document.createElement('p'),{className:'footnote',textContent:'* = estimated date based on typical permit timelines · Numbers on timeline match bullets below'}) );
    content.appendChild(pane);
  });
}
function switchTab(ticker){
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.ticker===ticker));
  document.querySelectorAll('.pane').forEach(p=>p.classList.toggle('active',p.id===`pane-${ticker}`));
}

// ─── RUN UPDATE ──────────────────────────────────────────────────────────────
async function runUpdate(){
  const btn=document.getElementById('runBtn'),msg=document.getElementById('statusMsg');
  const SVG_ICON='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.5"/></svg>';
  btn.style.background='#475569';btn.style.cursor='wait';btn.textContent='Updating...';
  msg.style.display='inline-block';msg.style.background='var(--teal-bg)';msg.style.color='var(--teal-text)';

  let readUrls=new Set();
  try{const s=await window.storage.get('pit:read_urls');if(s)readUrls=new Set(JSON.parse(s.value));}catch(e){}

  const live={};
  for(const k of Object.keys(TICKER_DATA)){
    try{const s=await window.storage.get('ticker:'+k);live[k]=s?JSON.parse(s.value):TICKER_DATA[k];}
    catch(e){live[k]=TICKER_DATA[k];}
  }

  let totalNew=0,errors=[];
  const tickers=Object.keys(live);

  for(let i=0;i<tickers.length;i++){
    const ticker=tickers[i],td=live[ticker];
    msg.textContent=`Checking ${ticker} (${i+1}/${tickers.length})…`;
    if(i>0) await new Promise(r=>setTimeout(r,600));
    try{
      const res=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:(()=>{
          const prompt='Return ONLY a valid JSON array, no markdown. List recent news/press releases you know about '+td.name+' (ticker: '+ticker+', exchange: '+td.exchange+') from 2025 onward. Each object must have these exact keys: title, date (YYYY-MM-DD), url, project, type, confidence, notes. Type must be one of: News, Milestone, Event, Employee, Forecasted Catalyst. Confidence must be: Confirmed or Speculative. If nothing known return [].';
          return JSON.stringify({model:'claude-sonnet-4-6',max_tokens:2048,tools:[{type:'web_search_20250305',name:'web_search'}],messages:[{role:'user',content:prompt}]});
        })()
      });

      if(!res.ok){
        const errBody=await res.text().catch(()=>'');
        const errMsg=`HTTP ${res.status}: ${errBody.slice(0,100)}`;
        errors.push(`${ticker}: ${errMsg}`);
        console.error(ticker,errMsg);
        continue;
      }

      const data=await res.json();

      if(data.error){
        errors.push(`${ticker}: ${data.error.type||''} ${data.error.message||''}`);
        console.error(ticker,'API error body',data.error);
        continue;
      }

      // Handle both direct text and tool_use responses (web_search returns tool_result then text)
      const rawText=(data.content||[]).filter(c=>c.type==='text').map(c=>c.text).join('');

      // If stop_reason is tool_use, the model is mid-search — extract text from tool_result blocks too
      const toolResultText=(data.content||[])
        .filter(c=>c.type==='tool_result'||c.type==='tool_use')
        .map(c=>c.type==='tool_result'?JSON.stringify(c.content||''):'')
        .join('');

      const combinedText=rawText||toolResultText;

      if(!combinedText && data.stop_reason!=='tool_use'){
        errors.push(`${ticker}: empty response (stop=${data.stop_reason})`);
        console.warn(ticker,'no text block',data);
        continue;
      }
      if(data.stop_reason==='tool_use'&&!rawText){
        // Search in progress but no text yet — not an error, just no results this run
        console.log(ticker,'web search in progress, no text in this response');
        continue;
      }

      let items=[];
      try{
        const m=rawText.match(/\[.*\]/s);
        const clean=m?m[0]:rawText.replace(/^```[^\n]*\n?/,'').replace(/```$/,'').trim();
        items=JSON.parse(clean);
        if(!Array.isArray(items))items=[];
      }catch(pe){
        errors.push(`${ticker}: JSON parse — ${rawText.slice(0,60)}`);
        console.error(ticker,'parse error',pe,rawText.slice(0,300));
        continue;
      }

      const fresh=items.filter(item=>item&&item.url&&!readUrls.has(item.url));
      items.forEach(item=>{if(item&&item.url)readUrls.add(item.url);});

      if(fresh.length){
        fresh.forEach(item=>{item.isNew=true;item.symbol=ticker;item.link=item.url||'#';item.sourceType='Company PR';});
        live[ticker].catalysts=[...fresh,...(live[ticker].catalysts||[])];
        await window.storage.set('ticker:'+ticker,JSON.stringify(live[ticker]));
        totalNew+=fresh.length;
      }
    }catch(apiErr){
      errors.push(`${ticker}: ${apiErr.message||String(apiErr)}`);
      console.error(ticker,apiErr);
    }
  }

  try{await window.storage.set('pit:read_urls',JSON.stringify([...readUrls]));}catch(e){}
  buildPanes(live);

  btn.style.background='';btn.style.cursor='';
  btn.innerHTML=SVG_ICON+' Run Update';
  const ts=new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'2-digit',minute:'2-digit'});
  document.getElementById('lastUpdated').textContent='Last updated: '+ts;

  if(errors.length){
    msg.style.background='var(--rose-bg)';msg.style.color='var(--rose-text)';
    msg.textContent=`${errors.length} error(s): ${errors[0]}`;
    console.error('All errors:',errors);
  } else {
    msg.style.background='var(--teal-bg)';msg.style.color='var(--teal-text)';
    msg.textContent=totalNew>0?`✓ ${totalNew} new item${totalNew>1?'s':''} added`:'✓ All tickers up to date';
  }
  setTimeout(()=>{msg.style.display='none';},8000);
}

// ─── CLEAR NEW FLAGS ─────────────────────────────────────────────────────────
async function clearNew(){
  for(const k of Object.keys(TICKER_DATA)){
    try{
      const s=await window.storage.get('ticker:'+k);
      if(s){
        const td=JSON.parse(s.value);
        let changed=false;
        (td.catalysts||[]).forEach(c=>{if(c.isNew){delete c.isNew;changed=true;}});
        if(changed)await window.storage.set('ticker:'+k,JSON.stringify(td));
      }
    }catch(e){}
  }
  // Rebuild from cleared storage
  const live={};
  for(const k of Object.keys(TICKER_DATA)){
    try{const s=await window.storage.get('ticker:'+k);live[k]=s?JSON.parse(s.value):TICKER_DATA[k];}
    catch(e){live[k]=TICKER_DATA[k];}
  }
  buildPanes(live);
}
async function init(){
  // Seed storage from TICKER_DATA if not already stored
  for(const[k,v]of Object.entries(TICKER_DATA)){
    try{const ex=await window.storage.get('ticker:'+k);if(!ex)await window.storage.set('ticker:'+k,JSON.stringify(v));}catch(e){}
  }
  // Load from storage (Run Update may have updated individual tickers)
  const live={};
  for(const k of Object.keys(TICKER_DATA)){
    try{const s=await window.storage.get('ticker:'+k);live[k]=s?JSON.parse(s.value):TICKER_DATA[k];}
    catch(e){live[k]=TICKER_DATA[k];}
  }
  buildPanes(live);
  document.getElementById('lastUpdated').textContent='Last updated: '+new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}
init();
</script>
